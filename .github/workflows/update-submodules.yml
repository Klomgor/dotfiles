name: Automatic Update Submodules
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'
  pull_request:
    types:
      - opened
      - synchronize
jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
