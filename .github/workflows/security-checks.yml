name: Dotfiles Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'  # Run daily at 7:00 AM UTC
  workflow_dispatch:  # Allow manual triggers

jobs:
  security_scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: GitLeaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          
      - name: TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@v3.34.0
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Super-Linter
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_BASH: true
          VALIDATE_ZSH: true
          
  chezmoi_test:
    name: Chezmoi Configuration Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install Chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b $HOME/.local/bin
        
      - name: Add to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
        
      - name: Verify Chezmoi configuration
        run: |
          chezmoi init --dry-run .
          chezmoi apply --dry-run
          chezmoi data
          
  notify:
    name: Notification
    needs: [security_scan, lint, chezmoi_test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check workflow result
        id: check
        run: |
          if [[ ${{ contains(needs.*.result, 'failure') }} == true ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi
          
      - name: Create status issue on failure
        if: steps.check.outputs.status == 'failure'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Workflow failure on ${context.sha.substring(0, 7)}`,
              body: `Workflow [${context.workflow}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) failed on commit ${context.sha}.`
            }) 